<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js""></script>
    <link rel="stylesheet" href="style.css">
    <title>World clock</title>
</head>
<body>
    <div class="container">
        <h1>World Clock </h1>
        <select id="city-select">
            <option value="">Select a city..</option>
            <option value="current">My current location</option>
            <option value="America/New_York">New York</option>
            <option value="Europe/Paris">Paris</option>
            <option value="Pacific/Auckland">Auckland</option>
        </select>
        <div id="cities">
            <div class="city-container" id="#los-angeles">
                <div>
                    <h2>Los Angeles </h2>
                    <div class="date" id="los-angeles-date"></div>
                </div>
                <div class="time" id="los-angeles-time"></div>
            </div>
            <div class="city-container" id="paris">
                <div>
                    <h2>Paris </h2>
                    <div class="date" id="paris-date"></div>
                </div>
                <div class="time" id="paris-time"></div>
            </div>
        </div>
    </div>
    <footer>
        This project is coded with ❤️ by <strong>Bhavani macharla</strong> and <a href="https://github.com/bhavani-mhrl/World_clock.git" target="_blank">open - sourced on Github</a>
    </footer>
    <script src="script.js"></script>
</body>
</html>
